name: screenshotbuilder
description: "Build and export App Store and Play Store screenshots."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  dartz: ^0.10.1
  flutter_bloc: ^9.1.1
  injectable: ^2.7.1+4
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  intl: ^0.20.2
  go_router: ^17.2.0
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  flutter_colorpicker: ^1.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  injectable_generator: ^2.12.1
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
